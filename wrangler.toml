name = "grassroots-class-site"
compatibility_date = "2026-03-09"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "_site"

[vars]
GOOGLE_SHEETS_CONTACT_TAB = "Contact Messages"
GOOGLE_SHEETS_SIGNUPS_TAB = "Newsletter Signups"
GOOGLE_SHEETS_PRAYER_TAB = "Prayer Requests"

[[d1_databases]]
binding = "SITE_DATA"
database_name = "grassroots-class-site-data"
database_id = "768987d7-2729-4f9b-9764-a8736394a156"

[[services]]
binding = "CONTACT_MAILER"
service = "grassroots-contact-mailer"
